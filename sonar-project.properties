# SonarQube project settings

# Coverage report path — vitest generates this in coverage/ directory
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Coverage exclusions: test files + entry points + pure interface/type files
sonar.coverage.exclusions=\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx,\
  **/setupTests.ts,\
  src/main.tsx,\
  src/App.tsx,\
  src/routes/index.tsx,\
  src/app/core/di/index.ts,\
  src/app/domain/index.ts,\
  src/app/data/index.ts,\
  src/app/core/navigation/index.ts,\
  src/app/domain/entities/user.model.ts,\
  src/app/domain/services/userService.ts,\
  src/vite-env.d.ts

sonar.cpd.exclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx
