sonar.projectKey=react-app
sonar.projectName=React App

sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**

sonar.javascript.lcov.reportPaths=coverage/lcov.info

sonar.coverage.exclusions=\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx,\
  **/setupTests.ts,\
  src/main.tsx,\
  src/App.tsx,\
  src/routes/**,\
  src/app/core/di/index.ts,\
  src/app/core/navigation/index.ts,\
  src/app/domain/index.ts,\
  src/app/data/index.ts,\
  src/app/domain/entities/user.model.ts,\
  src/app/domain/services/userService.ts,\
  src/vite-env.d.ts

sonar.cpd.exclusions=**/*.test.ts,**/*.test.tsx

sonar.scm.disabled=true
