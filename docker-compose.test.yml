services:
  test:
    build:
      context: .
      dockerfile: Dockerfile.ci
      target: builder
    working_dir: /app
    volumes:
      - ./coverage:/output
    command: sh -c "npx vitest run --coverage --coverage.all --coverage.reporter=lcov --coverage.reportsDirectory=./coverage && cp -r ./coverage/* /output/ 2>/dev/null || true"
